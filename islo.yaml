name: world-trump-2026
image: ubuntu:22.04

services:
  - name: redis
    port: 6379
    image: redis:7-alpine

  - name: backend
    port: 8000
    build:
      context: ./backend
    env:
      REDIS_URL: redis://localhost:6379

  - name: frontend
    port: 3000
    build:
      context: ./frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
